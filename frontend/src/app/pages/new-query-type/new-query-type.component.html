<h1>New Query — Step 1: Select Type</h1>

<div>
  <select [(ngModel)]="selectedType">
    <option value="" disabled>-- Select query type --</option>
    <option *ngFor="let t of queryTypes" [value]="t">{{ t }}</option>
  </select>
</div>
<br>
<button (click)="back()">Back</button>
<button (click)="next()" [disabled]="!selectedType">Next</button>
